services:
  - type: web
    name: fruitopia
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: FIREBASE_API_KEY
        value: ""
      - key: FIREBASE_AUTH_DOMAIN
        value: ""
      - key: FIREBASE_PROJECT_ID
        value: ""
      - key: FIREBASE_STORAGE_BUCKET
        value: ""
      - key: FIREBASE_MESSAGING_SENDER_ID
        value: ""
      - key: FIREBASE_APP_ID
        value: ""
